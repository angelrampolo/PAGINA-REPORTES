        $('btnAddArea').addEventListener('click', addArea);
        $('areaInput').addEventListener('keydown', e => { if (e.key === 'Enter') addArea(); });

        /* ===== CLEAR SCHEDULE ===== */
        $('btnClear').addEventListener('click', () => {
            if (!Object.keys(schedule).length) { toast('El horario ya está vacío', true); return; }
            if (confirm('¿Seguro que desea limpiar todo el horario?')) {
                schedule = {};
                rebuildGrid();
                saveState();
                toast('Horario limpiado');
            }
        });

        /* ===== GRID ===== */
        function getTodayIndex() {
            const gridDays = getGridDays();
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            for (let i = 0; i < gridDays.length; i++) {
                const gd = new Date(gridDays[i].fullDate);
                gd.setHours(0, 0, 0, 0);
                if (gd.getTime() === today.getTime()) return i;
            }
            return -1;
        }

        // Get unique workers for a shift (set of hours) on a given day — EXCLUDES extra entries
        function getShiftWorkers(dayIdx, startH, endH) {
            const seen = new Map();
            for (let h = startH; h < endH; h++) {
                const hh = h >= 24 ? h - 24 : h;
                const key = dayIdx + '-' + hh;
                const entries = schedule[key] || [];
                entries.forEach(en => {
                    if (!en.isExtra && !seen.has(en.workerId)) {
                        seen.set(en.workerId, en);
                    }
                });
            }
            return Array.from(seen.values());
        }

        // Assign a worker to all hours in a shift (main only, not extra)
        function assignShift(dayIdx, startH, endH, workerId, areaId) {
            for (let h = startH; h < endH; h++) {
                const hh = h >= 24 ? h - 24 : h;
                const key = dayIdx + '-' + hh;
                if (!schedule[key]) schedule[key] = [];
                // Only check duplicates among non-extra entries
                if (!schedule[key].some(en => en.workerId === workerId && !en.isExtra)) {
                    schedule[key].push({ workerId, areaId });
                }
            }
        }

        // Assign a worker to the extra hours of a shift
        function assignExtra(dayIdx, extraStartH, extraEndH, workerId, areaId) {
            for (let h = extraStartH; h < extraEndH; h++) {
                const hh = h >= 24 ? h - 24 : h;
                const key = dayIdx + '-' + hh;
                if (!schedule[key]) schedule[key] = [];
                // Only check duplicates among extra entries
                if (!schedule[key].some(en => en.workerId === workerId && en.isExtra)) {
                    schedule[key].push({ workerId, areaId, isExtra: true });
                }
            }
        }

        // Remove a worker from all hours in a shift (main entries only, preserves extras)
        function removeShift(dayIdx, startH, endH, workerId) {
            for (let h = startH; h < endH; h++) {
                const hh = h >= 24 ? h - 24 : h;
                const key = dayIdx + '-' + hh;
                if (schedule[key]) {
                    schedule[key] = schedule[key].filter(en => !(en.workerId === workerId && !en.isExtra));
                    if (!schedule[key].length) delete schedule[key];
                }
            }
        }

        // Remove a worker from extra hours only (entries with isExtra flag)
        function removeExtra(dayIdx, extraStartH, extraEndH, workerId) {
            for (let h = extraStartH; h < extraEndH; h++) {
                const hh = h >= 24 ? h - 24 : h;
                const key = dayIdx + '-' + hh;
                if (schedule[key]) {
                    schedule[key] = schedule[key].filter(en => !(en.workerId === workerId && en.isExtra));
                    if (!schedule[key].length) delete schedule[key];
                }
            }
        }

        // Get workers in the extra hours of a shift
        function getExtraWorkers(dayIdx, extraStartH, extraEndH) {
            const seen = new Map();
            for (let h = extraStartH; h < extraEndH; h++) {
                const hh = h >= 24 ? h - 24 : h;
                const key = dayIdx + '-' + hh;
                const entries = schedule[key] || [];
                entries.forEach(en => {
                    if (en.isExtra && !seen.has(en.workerId)) {
                        seen.set(en.workerId, en);
                    }
                });
            }
            return Array.from(seen.values());
        }

        // Copy all schedule entries for a day
        function copyDay(dayIdx) {
            copiedDay = [];
            copiedDayIdx = dayIdx;
            for (let h = 0; h < 24; h++) {
                const key = dayIdx + '-' + h;
                const entries = schedule[key] || [];
                entries.forEach(en => {
                    copiedDay.push({ hour: h, workerId: en.workerId, areaId: en.areaId, isExtra: en.isExtra || false });
                });
            }
            toast('Día copiado (' + copiedDay.length + ' turnos)');
            rebuildGrid();
        }

        // Paste copied entries to target day
        function pasteDay(dayIdx) {
            if (!copiedDay || !copiedDay.length) { toast('Nada que pegar', true); return; }
            let count = 0;
            copiedDay.forEach(({ hour, workerId, areaId, isExtra }) => {
                const key = dayIdx + '-' + hour;
                if (!schedule[key]) schedule[key] = [];
                if (!schedule[key].some(en => en.workerId === workerId && (!!en.isExtra) === (!!isExtra))) {
                    const entry = { workerId, areaId };
                    if (isExtra) entry.isExtra = true;
                    schedule[key].push(entry);
                    count++;
                }
            });
            rebuildGrid();
            saveState();
            toast('Pegados ' + count + ' turnos');
        }

        function rebuildGrid() {
            hourStart = parseInt($('hourStart').value);
            if (isNaN(hourStart) || hourStart < 0) hourStart = 0;
            if (hourStart > 23) hourStart = 23;
            hourEnd = parseInt($('hourEnd').value);
            if (isNaN(hourEnd) || hourEnd < 1) hourEnd = 1;
            if (hourEnd > 24) hourEnd = 24;
            if (hourEnd <= hourStart) { hourEnd = hourStart + 1; }
            $('hourStart').value = hourStart;
            $('hourEnd').value = hourEnd;

            weekStartDate = $('weekStartDate').value || weekStartDate;

            // Toggle hour controls visibility
            $('hourControls').style.display = viewMode === 'hours' ? '' : 'none';

            // Update mode toggle buttons
            document.querySelectorAll('.mode-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.mode === viewMode);
            });

            if (viewMode === 'shifts') {
                buildShiftGrid();
            } else {
                buildHoursGrid();
            }
        }

        function buildHoursGrid() {
            const grid = $('scheduleGrid');
            grid.classList.remove('shift-mode');
            const gridDays = getGridDays();
            const todayIdx = getTodayIndex();
            let html = '';

            // Headers with copy/paste actions
            html += '<div class="sg-hdr">🕐</div>';
            gridDays.forEach((gd, i) => {
                let cls = 'sg-hdr day-col';
                if (i === todayIdx) cls += ' today-col';
                if (gd.isWeekend) cls += ' weekend-col';
                if (i === copiedDayIdx) cls += ' copied-col';
                html += `<div class="${cls}" data-di="${i}">${gd.name}<span class="day-short">${gd.dayNum} ${gd.monthName}</span>
                <div class="day-actions">
                    <button class="day-act btn-copy-day" data-di="${i}" title="Copiar día">📋</button>
                    <button class="day-act btn-paste-day" data-di="${i}" title="Pegar día" ${!copiedDay ? 'disabled style="opacity:.3"' : ''}>📥</button>
                </div></div>`;
            });

            // Rows
            let totalAssigned = 0;
            let totalCells = 0;
            for (let h = hourStart; h < hourEnd; h++) {
                const isEven = (h - hourStart) % 2 === 0;
                const hNext = h + 1;
                const hDisplay = h === 0 ? '0' : h;
                const hNextDisplay = hNext === 24 ? '0' : hNext;
                html += `<div class="sg-time"><div class="time-range"><span class="time-start">${hDisplay}:00</span><span class="time-sep">a</span><span class="time-end">${hNextDisplay}:00</span></div></div>`;
                for (let di = 0; di < NUM_DAYS; di++) {
                    const key = di + '-' + h;
                    const entries = schedule[key] || [];
                    totalAssigned += entries.length;
                    totalCells++;

                    let cls = 'sg-cell';
                    if (isEven) cls += ' row-even';
                    if (gridDays[di].isWeekend) cls += ' weekend';
                    if (di === todayIdx) cls += ' today-highlight';
                    if (entries.length > 0) cls += ' has-entries';

                    let cellHTML = entries.map(en => {
                        const w = workers.find(ww => ww.id === en.workerId);
                        if (!w) return '';
                        const area = areas.find(aa => aa.id === en.areaId);
                        const aName = area ? area.name : '';
                        const isExtra = en.isExtra ? true : false;
                        const extraCls = isExtra ? ' is-extra' : '';
                        const areaOpts = areas.map(aa =>
                            `<option value="${aa.id}" ${aa.id === en.areaId ? 'selected' : ''}>${esc(aa.name)}</option>`
                        ).join('');
                        return `<div class="cell-entry${extraCls}" style="background:${hexAlpha(w.color, isExtra ? .08 : .14)};color:${w.color}">
          <span class="ce-dot" style="background:${w.color}"></span>
          <span class="ce-name">${esc(w.name)}</span>
          ${isExtra ? '<span class="ce-extra-tag">Otra Área</span>' : ''}
          ${aName ? `<span class="ce-area-tag">${esc(aName)}</span>` : ''}
          <span class="ce-remove" data-key="${key}" data-wid="${w.id}" title="Quitar">✕</span>
          ${areas.length ? `<select class="ce-select" data-key="${key}" data-wid="${w.id}" title="Cambiar área">${areaOpts}</select>` : ''}
        </div>`;
                    }).join('');

                    html += `<div class="${cls}" data-key="${key}" data-di="${di}" data-hour="${h}">${cellHTML}</div>`;
                }
            }
            grid.innerHTML = html;

            // Stats
            $('statAssigned').textContent = totalAssigned;
            $('statCells').textContent = totalCells;

            // Attach events — drop + multi-hour drag
            attachHoursEvents(grid);
        }

        function attachHoursEvents(grid) {
            // Copy/paste day buttons
            grid.querySelectorAll('.btn-copy-day').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    copyDay(parseInt(btn.dataset.di));
                });
            });
            grid.querySelectorAll('.btn-paste-day').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    pasteDay(parseInt(btn.dataset.di));
                });
            });

            // Cell drag & drop (worker from sidebar)
            grid.querySelectorAll('.sg-cell').forEach(cell => {
                cell.addEventListener('dragover', e => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'copy';
                    cell.classList.add('drag-over');
                });
                cell.addEventListener('dragleave', () => {
                    cell.classList.remove('drag-over');
                });
                cell.addEventListener('drop', e => {
                    e.preventDefault();
                    cell.classList.remove('drag-over');
                    const wid = e.dataTransfer.getData('text/plain') || dragWorkerId;
                    if (!wid) return;
                    const key = cell.dataset.key;
                    const di = parseInt(cell.dataset.di);
                    const hour = parseInt(cell.dataset.hour);
                    if (!schedule[key]) schedule[key] = [];
                    if (schedule[key].some(en => en.workerId === wid)) {
                        toast('Este trabajador ya está aquí', true);
                        return;
                    }
                    const defArea = areas.length ? areas[0].id : '';
                    schedule[key].push({ workerId: wid, areaId: defArea });

                    // Start multi-hour drag
                    rangeDrag = { active: true, workerId: wid, dayIdx: di, startHour: hour, endHour: hour };
                    rebuildGrid();
                    saveState();
                });

                // Multi-hour drag: on mouseenter while rangeDrag is active
                cell.addEventListener('mouseenter', () => {
                    if (!rangeDrag.active) return;
                    const di = parseInt(cell.dataset.di);
                    const hour = parseInt(cell.dataset.hour);
                    if (di !== rangeDrag.dayIdx) return; // same column only
                    rangeDrag.endHour = hour;
                    updateRangeHighlight(grid);
                });
            });

            // Multi-hour drag: finalize on mouseup
            document.addEventListener('mouseup', finalizeRangeDrag);

            // Remove buttons
            grid.querySelectorAll('.ce-remove').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    const key = btn.dataset.key;
                    const wid = btn.dataset.wid;
                    if (!schedule[key]) return;
                    schedule[key] = schedule[key].filter(en => en.workerId !== wid);
                    if (!schedule[key].length) delete schedule[key];
                    rebuildGrid();
                    saveState();
                });
            });

            // Area selectors
            grid.querySelectorAll('.ce-select').forEach(sel => {
                sel.addEventListener('change', () => {
                    const key = sel.dataset.key;
                    const wid = sel.dataset.wid;
                    if (!schedule[key]) return;
                    const entry = schedule[key].find(en => en.workerId === wid);
                    if (entry) entry.areaId = sel.value;
                    rebuildGrid();
                    saveState();
                });
            });

            saveState();
        }

        // Range drag: highlight cells in range
        function updateRangeHighlight(grid) {
            grid.querySelectorAll('.sg-cell').forEach(cell => {
                cell.classList.remove('range-select');
                if (!rangeDrag.active) return;
                const di = parseInt(cell.dataset.di);
                const hour = parseInt(cell.dataset.hour);
                if (di !== rangeDrag.dayIdx) return;
                const lo = Math.min(rangeDrag.startHour, rangeDrag.endHour);
                const hi = Math.max(rangeDrag.startHour, rangeDrag.endHour);
                if (hour >= lo && hour <= hi) {
                    cell.classList.add('range-select');
                }
            });
        }

        // Finalize multi-hour drag: assign worker to all hours in range
        function finalizeRangeDrag() {
            if (!rangeDrag.active) return;
            const { workerId, dayIdx, startHour, endHour } = rangeDrag;
            const lo = Math.min(startHour, endHour);
            const hi = Math.max(startHour, endHour);
            const defArea = areas.length ? areas[0].id : '';
            let added = 0;
            for (let h = lo; h <= hi; h++) {
                const key = dayIdx + '-' + h;
                if (!schedule[key]) schedule[key] = [];
                if (!schedule[key].some(en => en.workerId === workerId)) {
                    schedule[key].push({ workerId, areaId: defArea });
                    added++;
                }
            }
            rangeDrag = { active: false, workerId: '', dayIdx: -1, startHour: -1, endHour: -1 };
            if (added > 0) {
                rebuildGrid();
                saveState();
                if (hi - lo > 0) toast('Asignado a ' + (hi - lo + 1) + ' horas');
            }
        }

        /* ===== SHIFT MODE GRID ===== */
        function buildShiftGrid() {
            const grid = $('scheduleGrid');
            grid.classList.add('shift-mode');
            const gridDays = getGridDays();
            const todayIdx = getTodayIndex();
            let html = '';

            // Headers
            html += '<div class="sg-hdr">Turno</div>';
            gridDays.forEach((gd, i) => {
                let cls = 'sg-hdr day-col';
                if (i === todayIdx) cls += ' today-col';
                if (gd.isWeekend) cls += ' weekend-col';
                if (i === copiedDayIdx) cls += ' copied-col';
                html += `<div class="${cls}" data-di="${i}">${gd.name}<span class="day-short">${gd.dayNum} ${gd.monthName}</span>
                <div class="day-actions">
                    <button class="day-act btn-copy-day" data-di="${i}" title="Copiar día">📋</button>
                    <button class="day-act btn-paste-day" data-di="${i}" title="Pegar día" ${!copiedDay ? 'disabled style="opacity:.3"' : ''}>📥</button>
                </div></div>`;
            });

            // Shift rows + Extra rows
            let totalAssigned = 0;
            SHIFTS.forEach((shift, si) => {
                // === Main shift label ===
                html += `<div class="sg-shift-label">
                    <span class="shift-icon">${shift.icon}</span>
                    <span class="shift-name">${shift.name}</span>
                    <span class="shift-hours">${shift.startH}:00 a ${shift.endH >= 24 ? (shift.endH - 24) : shift.endH}:00</span>
                </div>`;

                // === Main shift day cells ===
                for (let di = 0; di < NUM_DAYS; di++) {
                    const shiftWorkers = getShiftWorkers(di, shift.startH, shift.endH);
                    totalAssigned += shiftWorkers.length;

                    let cls = 'sg-shift-cell';
                    if (gridDays[di].isWeekend) cls += ' weekend';
                    if (shiftWorkers.length > 0) cls += ' has-entries';

                    const areaOpts = areas.map(aa =>
                        `<option value="${aa.id}">${esc(aa.name)}</option>`
                    ).join('');

                    let pillsHTML = shiftWorkers.map(en => {
                        const w = workers.find(ww => ww.id === en.workerId);
                        if (!w) return '';
                        const selOpts = areas.map(aa =>
                            `<option value="${aa.id}" ${aa.id === en.areaId ? 'selected' : ''}>${esc(aa.name)}</option>`
                        ).join('');
                        const area = areas.find(aa => aa.id === en.areaId);
                        const areaTag = area ? `<span class="ce-area-tag">${esc(area.name)}</span>` : '';
                        return `<div class="shift-pill" style="background:${hexAlpha(w.color, .15)};color:${w.color}">
                            <span class="sp-dot" style="background:${w.color}"></span>
                            ${esc(w.name)}
                            ${areaTag}
                            ${areas.length ? `<select class="sp-area-select" data-di="${di}" data-si="${si}" data-wid="${w.id}" title="Cambiar área">${selOpts}</select>` : ''}
                            <span class="sp-remove" data-di="${di}" data-si="${si}" data-wid="${w.id}" title="Quitar">✕</span>
                        </div>`;
                    }).join('');

                    html += `<div class="${cls}" data-di="${di}" data-si="${si}">${pillsHTML}</div>`;
                }

                // === "Otra Área" hours label ===
                const extraStartDisp = shift.extraStartH >= 24 ? (shift.extraStartH - 24) : shift.extraStartH;
                const extraEndDisp = shift.extraEndH >= 24 ? (shift.extraEndH - 24) : shift.extraEndH;
                html += `<div class="sg-extra-label">
                    <span class="extra-icon">🔄</span>
                    <span class="extra-name">Otra Área</span>
                    <span class="extra-hours">${extraStartDisp}:00 a ${extraEndDisp}:00</span>
                </div>`;

                // === Extra hours day cells ===
                for (let di = 0; di < NUM_DAYS; di++) {
                    const extraWorkers = getExtraWorkers(di, shift.extraStartH, shift.extraEndH);
                    totalAssigned += extraWorkers.length;

                    let cls = 'sg-extra-cell';
                    if (gridDays[di].isWeekend) cls += ' weekend';
                    if (extraWorkers.length > 0) cls += ' has-entries';

                    let pillsHTML = extraWorkers.map(en => {
                        const w = workers.find(ww => ww.id === en.workerId);
                        if (!w) return '';
                        const selOpts = areas.map(aa =>
                            `<option value="${aa.id}" ${aa.id === en.areaId ? 'selected' : ''}>${esc(aa.name)}</option>`
                        ).join('');
                        const area = areas.find(aa => aa.id === en.areaId);
                        const areaTag = area ? `<span class="ce-area-tag" style="font-size:7px">${esc(area.name)}</span>` : '';
                        return `<div class="extra-pill" style="background:${hexAlpha(w.color, .1)};color:${w.color}">
                            <span class="ep-dot" style="background:${w.color}"></span>
                            ${esc(w.name)}
                            ${areaTag}
                            ${areas.length ? `<select class="ep-area-select" data-di="${di}" data-si="${si}" data-wid="${w.id}" title="Cambiar otra área">${selOpts}</select>` : ''}
                            <span class="ep-remove" data-di="${di}" data-si="${si}" data-wid="${w.id}" title="Quitar otra área">✕</span>
                        </div>`;
                    }).join('');

                    html += `<div class="${cls}" data-di="${di}" data-si="${si}">${pillsHTML}</div>`;
                }
            });

            grid.innerHTML = html;
            $('statAssigned').textContent = totalAssigned;
            $('statCells').textContent = NUM_DAYS * SHIFTS.length * 2; // main + extra

            // Attach shift events
            attachShiftEvents(grid);
        }

        function attachShiftEvents(grid) {
            // Copy/paste day buttons
            grid.querySelectorAll('.btn-copy-day').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    copyDay(parseInt(btn.dataset.di));
                });
            });
            grid.querySelectorAll('.btn-paste-day').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    pasteDay(parseInt(btn.dataset.di));
                });
            });

            // Drop on main shift cells → assigns main shift + auto-assigns extra hours
            grid.querySelectorAll('.sg-shift-cell').forEach(cell => {
                cell.addEventListener('dragover', e => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'copy';
                    cell.classList.add('drag-over');
                });
                cell.addEventListener('dragleave', () => {
                    cell.classList.remove('drag-over');
                });
                cell.addEventListener('drop', e => {
                    e.preventDefault();
                    cell.classList.remove('drag-over');
                    const wid = e.dataTransfer.getData('text/plain') || dragWorkerId;
                    if (!wid) return;
                    const di = parseInt(cell.dataset.di);
                    const si = parseInt(cell.dataset.si);
                    const shift = SHIFTS[si];
                    const defArea = areas.length ? areas[0].id : '';
                    // Assign main shift
                    assignShift(di, shift.startH, shift.endH, wid, defArea);
                    // Auto-assign extra hours (with same default area, user can change)
                    assignExtra(di, shift.extraStartH, shift.extraEndH, wid, defArea);
                    rebuildGrid();
                    saveState();
                    toast(workers.find(w => w.id === wid)?.name + ' → ' + shift.name + ' + Otra Área');
                });
            });

            // Drop on extra cells → assigns only extra hours
            grid.querySelectorAll('.sg-extra-cell').forEach(cell => {
                cell.addEventListener('dragover', e => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'copy';
                    cell.classList.add('drag-over');
                });
                cell.addEventListener('dragleave', () => {
                    cell.classList.remove('drag-over');
                });
                cell.addEventListener('drop', e => {
                    e.preventDefault();
                    cell.classList.remove('drag-over');
                    const wid = e.dataTransfer.getData('text/plain') || dragWorkerId;
                    if (!wid) return;
                    const di = parseInt(cell.dataset.di);
                    const si = parseInt(cell.dataset.si);
                    const shift = SHIFTS[si];
                    const defArea = areas.length ? areas[0].id : '';
                    assignExtra(di, shift.extraStartH, shift.extraEndH, wid, defArea);
                    rebuildGrid();
                    saveState();
                    toast(workers.find(w => w.id === wid)?.name + ' → Otra Área ' + shift.name);
                });
            });

            // Remove buttons on main shift pills
            grid.querySelectorAll('.sp-remove').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    const di = parseInt(btn.dataset.di);
                    const si = parseInt(btn.dataset.si);
                    const wid = btn.dataset.wid;
                    const shift = SHIFTS[si];
                    removeShift(di, shift.startH, shift.endH, wid);
                    // Also remove extra hours when removing from main shift
                    removeExtra(di, shift.extraStartH, shift.extraEndH, wid);
                    rebuildGrid();
                    saveState();
                });
            });

            // Remove buttons on extra pills
            grid.querySelectorAll('.ep-remove').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    const di = parseInt(btn.dataset.di);
                    const si = parseInt(btn.dataset.si);
                    const wid = btn.dataset.wid;
                    const shift = SHIFTS[si];
                    removeExtra(di, shift.extraStartH, shift.extraEndH, wid);
                    rebuildGrid();
                    saveState();
                });
            });

            // Area selector on main shift pills
            grid.querySelectorAll('.sp-area-select').forEach(sel => {
                sel.addEventListener('change', e => {
                    e.stopPropagation();
                    const di = parseInt(sel.dataset.di);
                    const si = parseInt(sel.dataset.si);
                    const wid = sel.dataset.wid;
                    const shift = SHIFTS[si];
                    const newAreaId = sel.value;
                    // Update area for all main shift hours
                    for (let h = shift.startH; h < shift.endH; h++) {
                        const hh = h >= 24 ? h - 24 : h;
                        const key = di + '-' + hh;
                        if (schedule[key]) {
                            const entry = schedule[key].find(en => en.workerId === wid && !en.isExtra);
                            if (entry) entry.areaId = newAreaId;
                        }
                    }
                    rebuildGrid();
                    saveState();
                });
            });

            // Area selector on extra pills
            grid.querySelectorAll('.ep-area-select').forEach(sel => {
                sel.addEventListener('change', e => {
                    e.stopPropagation();
                    const di = parseInt(sel.dataset.di);
                    const si = parseInt(sel.dataset.si);
                    const wid = sel.dataset.wid;
                    const shift = SHIFTS[si];
                    const newAreaId = sel.value;
                    // Update area for all extra hours
                    for (let h = shift.extraStartH; h < shift.extraEndH; h++) {
                        const hh = h >= 24 ? h - 24 : h;
                        const key = di + '-' + hh;
                        if (schedule[key]) {
                            const entry = schedule[key].find(en => en.workerId === wid && en.isExtra);
                            if (entry) entry.areaId = newAreaId;
                        }
                    }
                    rebuildGrid();
                    saveState();
                });
            });

            saveState();
        }

        /* ===== MODE TOGGLE & TOOLBAR EVENTS ===== */
        $('btnApply').addEventListener('click', rebuildGrid);
        $('hourStart').addEventListener('change', rebuildGrid);
        $('hourEnd').addEventListener('change', rebuildGrid);
        $('weekStartDate').addEventListener('change', () => {
            weekStartDate = $('weekStartDate').value;
            rebuildGrid();
            saveState();
        });

        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                viewMode = btn.dataset.mode;
                rebuildGrid();
                saveState();
            });
        });

        /* ===== PDF EXPORT ===== */
        $('btnPDF').addEventListener('click', exportPDF);

        // Preload logo for PDF — use fetch for file:// compatibility
        let logoDataUrl = null;
        (function preloadLogo() {
            // Method 1: fetch as blob
            fetch('logo.png').then(r => r.blob()).then(blob => {
                const reader = new FileReader();
                reader.onload = () => { logoDataUrl = reader.result; };
                reader.readAsDataURL(blob);
            }).catch(() => {
                // Method 2: fallback with img + canvas
                const img = new Image();
                img.onload = function () {
                    const c = document.createElement('canvas');
                    c.width = img.naturalWidth; c.height = img.naturalHeight;
                    c.getContext('2d').drawImage(img, 0, 0);
                    try { logoDataUrl = c.toDataURL('image/png'); } catch (e) { }
                };
                img.src = 'logo.png';
            });
        })();

        function exportPDF() {
            if (!workers.length) { toast('Agregue al menos un trabajador', true); return; }
            if (!Object.keys(schedule).length) { toast('El horario está vacío', true); return; }

            if (viewMode === 'shifts') { exportShiftPDF(); return; }

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('l', 'mm', 'a4');
            const W = 297, H = 210, M = 8;

            // ========== DARK COLOR PALETTE ==========
            const cBg = [10, 15, 25];       // Page background
            const cBg2 = [15, 22, 35];       // Alternating row
            const cSurf = [20, 30, 48];       // Cell surface
            const cSurf2 = [28, 40, 62];       // Header surface
            const cBrd = [35, 50, 75];       // Borders/lines
            const cAcc = [99, 179, 255];     // Accent blue
            const cAccDim = [60, 120, 200];     // Dim accent
            const cTxt = [230, 235, 245];    // Primary text
            const cTxt2 = [180, 195, 215];    // Secondary text
            const cDim = [100, 120, 150];    // Muted text
            const cMute = [55, 70, 95];       // Very muted

            // ========== FULL PAGE DARK BG ==========
            function fillPageBg() {
                pdf.setFillColor(...cBg);
                pdf.rect(0, 0, W, H, 'F');
            }
            fillPageBg();

            // ========== HEADER ==========
            pdf.setFillColor(...cSurf2);
            pdf.rect(0, 0, W, 28, 'F');
            // Accent gradient line
            pdf.setFillColor(...cAcc);
            pdf.rect(0, 28, W, 1.2, 'F');

            // Logo
            if (logoDataUrl) {
                try { pdf.addImage(logoDataUrl, 'PNG', M + 1, 3, 22, 22); } catch (e) { }
            }
            const lOff = logoDataUrl ? M + 28 : M;

            pdf.setTextColor(...cTxt);
            pdf.setFontSize(16);
            pdf.setFont('helvetica', 'bold');
            pdf.text('HORARIO SEMANAL', lOff, 12);

            pdf.setFontSize(9);
            pdf.setTextColor(...cAcc);
            pdf.setFont('helvetica', 'normal');
            pdf.text('IMPORTADORA BELLA', lOff, 20);

            pdf.setFontSize(8);
            pdf.setTextColor(...cTxt2);
            const dateStr = new Date().toLocaleDateString('es-EC', {
                weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
            });
            pdf.text('Generado: ' + dateStr, W - M, 12, { align: 'right' });
            pdf.text('Horario: ' + hourStart + ':00 — ' + hourEnd + ':00', W - M, 20, { align: 'right' });

            let y = 33;

            // ========== GRID LAYOUT ==========
            const gridDays = getGridDays();
            const timeColW = 22;
            const colW = (W - 2 * M - timeColW) / NUM_DAYS;
            const entryItemH = 5.5;  // Fixed height per entry — no cramming
            const entryGap = 0.6;
            const minRowH = 9;

            // Pre-calculate row heights based on max entries in any cell for each hour
            const hours = hourEnd - hourStart;
            const rowHeights = [];
            for (let h = hourStart; h < hourEnd; h++) {
                let maxEntries = 0;
                for (let di = 0; di < NUM_DAYS; di++) {
                    const key = di + '-' + h;
                    const cnt = (schedule[key] || []).length;
                    if (cnt > maxEntries) maxEntries = cnt;
                }
                const needed = maxEntries > 0
                    ? Math.max(minRowH, 1.5 + maxEntries * (entryItemH + entryGap) + 0.5)
                    : minRowH;
                rowHeights.push(needed);
            }

            // ========== DAY HEADERS ==========
            function drawDayHeaders(yPos) {
                pdf.setFillColor(...cSurf2);
                pdf.rect(M, yPos, W - 2 * M, 8, 'F');
                // Bottom border
                pdf.setDrawColor(...cAcc);
                pdf.setLineWidth(0.4);
                pdf.line(M, yPos + 8, W - M, yPos + 8);
                pdf.setLineWidth(0.15);

                pdf.setTextColor(...cDim);
                pdf.setFontSize(6.5);
                pdf.setFont('helvetica', 'bold');
                pdf.text('HORA', M + timeColW / 2, yPos + 5.2, { align: 'center' });

                const dayClr = [
                    [255, 200, 80], [100, 180, 255], [80, 220, 160], [180, 160, 255],
                    [255, 180, 100], [255, 130, 155], [255, 200, 80], [255, 200, 80]
                ];
                gridDays.forEach((gd, i) => {
                    pdf.setTextColor(...dayClr[i % dayClr.length]);
                    const label = gd.name.substring(0, 3).toUpperCase() + ' ' + gd.dayNum;
                    pdf.text(label, M + timeColW + i * colW + colW / 2, yPos + 5.2, { align: 'center' });
                });
                return yPos + 8;
            }

            y = drawDayHeaders(y);

            // ========== DATA ROWS ==========
            for (let hi = 0; hi < hours; hi++) {
                const h = hourStart + hi;
                const rowH = rowHeights[hi];

                // Check page break
                if (y + rowH > H - 12) {
                    pdf.addPage();
                    fillPageBg();
                    // Mini header on new page
                    pdf.setFillColor(...cSurf2);
                    pdf.rect(0, 0, W, 10, 'F');
                    pdf.setFillColor(...cAcc);
                    pdf.rect(0, 10, W, 0.6, 'F');
                    pdf.setTextColor(...cTxt);
                    pdf.setFontSize(8);
                    pdf.setFont('helvetica', 'bold');
                    pdf.text('HORARIO SEMANAL — IMPORTADORA BELLA (cont.)', M, 7);
                    if (logoDataUrl) {
                        try { pdf.addImage(logoDataUrl, 'PNG', W - M - 8, 1, 8, 8); } catch (e) { }
                    }
                    y = 14;
                    y = drawDayHeaders(y);
                }

                // Row background — alternating dark shades
                const isEven = hi % 2 === 0;
                pdf.setFillColor(isEven ? cBg2[0] : cSurf[0], isEven ? cBg2[1] : cSurf[1], isEven ? cBg2[2] : cSurf[2]);
                pdf.rect(M, y, W - 2 * M, rowH, 'F');

                // Time cell
                pdf.setFillColor(...cSurf2);
                pdf.rect(M, y, timeColW, rowH, 'F');
                pdf.setDrawColor(...cBrd);
                pdf.rect(M, y, timeColW, rowH);

                // Time label — "6:00 a 7:00"
                const hNext = h + 1;
                const hDisp = h === 0 ? '0' : h;
                const hNextDisp = hNext === 24 ? '0' : hNext;
                pdf.setTextColor(...cTxt);
                pdf.setFontSize(8);
                pdf.setFont('helvetica', 'bold');
                pdf.text(hDisp + ':00', M + timeColW / 2, y + rowH / 2 - 1, { align: 'center' });
                pdf.setFontSize(5.5);
                pdf.setFont('helvetica', 'normal');
                pdf.setTextColor(...cDim);
                pdf.text('a ' + hNextDisp + ':00', M + timeColW / 2, y + rowH / 2 + 2, { align: 'center' });

                // Day cells
                for (let di = 0; di < NUM_DAYS; di++) {
                    const cx = M + timeColW + di * colW;

                    // Cell border
                    pdf.setDrawColor(...cBrd);
                    pdf.rect(cx, y, colW, rowH);

                    // Weekend subtle tint
                    if (gridDays[di].isWeekend) {
                        pdf.setFillColor(25, 30, 18);
                        pdf.rect(cx + 0.15, y + 0.15, colW - 0.3, rowH - 0.3, 'F');
                    }

                    const key = di + '-' + h;
                    const entries = schedule[key] || [];

                    entries.forEach((en, ei) => {
                        const w = workers.find(ww => ww.id === en.workerId);
                        if (!w) return;
                        const area = areas.find(aa => aa.id === en.areaId);
                        const rgb = hexToRgb(w.color);
                        const ey = y + 1 + ei * (entryItemH + entryGap);

                        // Colored pill with slight transparency effect
                        pdf.setFillColor(rgb[0], rgb[1], rgb[2]);
                        pdf.roundedRect(cx + 1, ey, colW - 2, entryItemH, 1.2, 1.2, 'F');

                        // White bold text
                        pdf.setTextColor(255, 255, 255);
                        pdf.setFontSize(6.5);
                        pdf.setFont('helvetica', 'bold');
                        let label = w.name;
                        if (area) label += ' — ' + area.name;
                        const maxLen = Math.floor((colW - 5) / 1.7);
                        if (label.length > maxLen) label = label.substring(0, maxLen - 1) + '…';
                        pdf.text(label, cx + 3, ey + entryItemH / 2 + 1.2);
                    });
                }

                // Row bottom border
                pdf.setDrawColor(...cBrd);
                pdf.line(M, y + rowH, W - M, y + rowH);
                y += rowH;
            }

            // ========== WORKER LEGEND ==========
            y += 5;
            if (y + 18 > H - 10) { pdf.addPage(); fillPageBg(); y = 12; }

            // Legend header bar
            pdf.setFillColor(...cSurf2);
            pdf.roundedRect(M, y, W - 2 * M, 7, 1.5, 1.5, 'F');
            pdf.setDrawColor(...cAcc);
            pdf.setLineWidth(0.3);
            pdf.line(M, y + 7, W - M, y + 7);
            pdf.setLineWidth(0.15);
            pdf.setTextColor(...cTxt);
            pdf.setFontSize(8);
            pdf.setFont('helvetica', 'bold');
            pdf.text('EQUIPO DE TRABAJO', M + 4, y + 4.8);
            y += 10;

            const cols = Math.min(5, workers.length);
            const lColW = (W - 2 * M) / cols;
            workers.forEach((w, i) => {
                const lx = M + (i % cols) * lColW;
                const ly = y + Math.floor(i / cols) * 7;
                if (ly + 7 > H - 8) return;

                const rgb = hexToRgb(w.color);
                // Colored pill
                pdf.setFillColor(rgb[0], rgb[1], rgb[2]);
                pdf.roundedRect(lx + 1, ly, lColW - 6, 5, 1.2, 1.2, 'F');
                pdf.setTextColor(255, 255, 255);
                pdf.setFontSize(7.5);
                pdf.setFont('helvetica', 'bold');
                pdf.text(w.name, lx + 4, ly + 3.5);
            });

            // ========== FOOTER ALL PAGES ==========
            const pgs = pdf.internal.getNumberOfPages();
            for (let p = 1; p <= pgs; p++) {
                pdf.setPage(p);

                // Footer dark bar
                pdf.setFillColor(...cSurf2);
                pdf.rect(0, H - 10, W, 10, 'F');
                pdf.setDrawColor(...cAcc);
                pdf.setLineWidth(0.3);
                pdf.line(0, H - 10, W, H - 10);
                pdf.setLineWidth(0.15);

                pdf.setFontSize(6.5);
                pdf.setTextColor(...cDim);
                pdf.setFont('helvetica', 'italic');
                pdf.text('Importadora Bella — Horario generado automáticamente', M, H - 4.5);

                pdf.setFont('helvetica', 'normal');
                pdf.text('Pág. ' + p + ' de ' + pgs, W - M, H - 4.5, { align: 'right' });
            }

            const gridDaysForName = getGridDays();
            const fname = 'Horario_' + gridDaysForName[0].dayNum + '_' + gridDaysForName[0].monthName + '_al_' + gridDaysForName[NUM_DAYS - 1].dayNum + '_' + gridDaysForName[NUM_DAYS - 1].monthName + '.pdf';
            pdf.save(fname);
            toast('PDF descargado: ' + fname);
        }

                for (let di = 0; di < NUM_DAYS; di++) {

                    pdf.rect(cx, y, colW, shiftRowH, 'FD');

                    const shiftWorkers = getShiftWorkers(di, shift.startH, shift.endH);
                    let ey = y + 3;

                    shiftWorkers.forEach(en => {

                        pdf.setFontSize(6.5);
                        pdf.setFont('helvetica', 'bold');
                        let label = w.name;
                        if (area) label += ' — ' + area.name;
                        const maxLen = Math.floor((colW - 5) / 1.7);
                        if (label.length > maxLen) label = label.substring(0, maxLen - 1) + '…';
                        pdf.text(label, cx + colW / 2, ey + 3.5, { align: 'center' });
                        ey += 6;
                    });
                }

                y += shiftRowH;

                // === Extra hours row ===
                const extraRowH = 18;
                const extraStartDisp = shift.extraStartH >= 24 ? (shift.extraStartH - 24) : shift.extraStartH;
                const extraEndDisp = shift.extraEndH >= 24 ? (shift.extraEndH - 24) : shift.extraEndH;

                pdf.setFillColor(15, 20, 30);
                pdf.rect(M, y, shiftLabelW, extraRowH, 'F');

                    pdf.setDrawColor(...cBrd);
                    pdf.setFillColor(12, 16, 25);
                    pdf.rect(cx, y, colW, extraRowH, 'FD');

                    const extraWorkers = getExtraWorkers(di, shift.extraStartH, shift.extraEndH);
                    let ey = y + 2;

                    extraWorkers.forEach(en => {
                        const w = workers.find(ww => ww.id === en.workerId);
                        if (!w) return;
                        const area = areas.find(aa => aa.id === en.areaId);
                        const rgb = hexToRgb(w.color);
                        // Slightly transparent pill for extra
                        pdf.setFillColor(Math.min(255, rgb[0] + 20), Math.min(255, rgb[1] + 20), Math.min(255, rgb[2] + 20));
                        pdf.roundedRect(cx + 2, ey, colW - 4, 4.5, 1, 1, 'F');
                        pdf.setTextColor(255, 255, 255);
                        pdf.setFontSize(5.5);
                        pdf.setFont('helvetica', 'bold');
                        let label = w.name;
                        if (area) label += ' — ' + area.name;
                        const maxLen = Math.floor((colW - 5) / 1.5);
                        if (label.length > maxLen) label = label.substring(0, maxLen - 1) + '…';
                        pdf.text(label, cx + colW / 2, ey + 3.2, { align: 'center' });
                        ey += 5;
                    });
                }

                y += extraRowH;
            });

            // ========== FOOTER ==========
            const pgs = pdf.internal.getNumberOfPages();
            for (let p = 1; p <= pgs; p++) {
                pdf.setPage(p);
                pdf.setFillColor(...cSurf2);
                pdf.rect(0, H - 10, W, 10, 'F');
                pdf.setDrawColor(...cAcc);
                pdf.setLineWidth(0.3);
                pdf.line(0, H - 10, W, H - 10);
                pdf.setLineWidth(0.15);

                pdf.setFontSize(6.5);
                pdf.setTextColor(...cDim);
                pdf.setFont('helvetica', 'italic');
                pdf.text('Importadora Bella — Horario por turnos', M, H - 4.5);
                pdf.setFont('helvetica', 'normal');
                pdf.text('Pág. ' + p + ' de ' + pgs, W - M, H - 4.5, { align: 'right' });
            }

            const gridDaysForName = getGridDays();
            const fname = 'Turnos_' + gridDaysForName[0].dayNum + '_' + gridDaysForName[0].monthName + '_al_' + gridDaysForName[NUM_DAYS - 1].dayNum + '_' + gridDaysForName[NUM_DAYS - 1].monthName + '.pdf';
            pdf.save(fname);
            toast('PDF descargado: ' + fname);
        }

        /* ===== UTILS ===== */
        function pad(n) { return String(n).padStart(2, '0'); }
        function hexAlpha(hex, a) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${a})`;
        }
        function hexToRgb(hex) {
            return [parseInt(hex.slice(1, 3), 16), parseInt(hex.slice(3, 5), 16), parseInt(hex.slice(5, 7), 16)];
        }
        function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
        function toast(msg, isErr) {
            const t = $('toast');
            t.textContent = (isErr ? '⚠ ' : '✅ ') + msg;
            t.className = 'toast ' + (isErr ? 'err' : 'ok');
            setTimeout(() => t.classList.add('show'), 10);
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        /* ===== INIT ===== */
        initWeekDate();
        if (sessionStorage.getItem('sv_auth') === '1') {
            loadState();
            initWeekDate();
            rebuildGrid();
        }
    </script>
</body>
