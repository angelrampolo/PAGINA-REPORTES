<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supervisor — Horarios | Importadora Bella</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        /* ===== DESIGN TOKENS ===== */
        :root {
            --bg: #05080D;
            --bg2: #0A0F18;
            --surf: #0F1520;
            --surf2: #151D2C;
            --surf3: #1B2538;
            --brd: #1E2A3E;
            --brd2: #2A3A54;
            --brd-glow: rgba(99, 179, 255, .15);
            --acc: #63B3FF;
            --acc2: #3A8EE6;
            --acc3: #1C6AC0;
            --acc-glow: rgba(99, 179, 255, .12);
            --grn: #4ADE80;
            --grn2: #22C55E;
            --grn-bg: rgba(74, 222, 128, .08);
            --red: #FB7185;
            --red2: #F43F5E;
            --red-bg: rgba(251, 113, 133, .08);
            --org: #FBBF24;
            --org-bg: rgba(251, 191, 36, .08);
            --pur: #A78BFA;
            --pur-bg: rgba(167, 139, 250, .08);
            --pink: #F472B6;
            --cyan: #22D3EE;
            --txt: #E8EDF5;
            --txt2: #C1CBDA;
            --dim: #6B7D95;
            --mute: #3D4F66;
            --r: 16px;
            --r2: 12px;
            --r3: 8px;
            --f: 'Inter', system-ui, -apple-system, sans-serif;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, .3);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, .4);
            --shadow-lg: 0 16px 64px rgba(0, 0, 0, .5);
            --shadow-glow: 0 0 40px rgba(99, 179, 255, .08);
        }

        /* ===== RESET & BASE ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
        }

        body {
            font-family: var(--f);
            background: var(--bg);
            color: var(--txt);
            min-height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 800px 600px at 10% 20%, rgba(99, 179, 255, .04), transparent),
                radial-gradient(ellipse 600px 500px at 90% 80%, rgba(167, 139, 250, .03), transparent),
                radial-gradient(ellipse 400px 300px at 50% 50%, rgba(74, 222, 128, .02), transparent);
            pointer-events: none;
            z-index: 0;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--mute);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--dim);
        }

        /* ===== LOGIN OVERLAY ===== */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(5, 8, 13, .92);
            backdrop-filter: blur(24px) saturate(1.2);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeIn .5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        .login-card {
            background: linear-gradient(170deg, var(--surf2), var(--surf));
            border: 1px solid var(--brd2);
            border-radius: 24px;
            padding: 48px 40px 40px;
            width: 400px;
            max-width: 92vw;
            box-shadow: var(--shadow-lg), 0 0 80px rgba(99, 179, 255, .06);
            animation: cardIn .6s cubic-bezier(.22, 1, .36, 1);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--acc), var(--pur), var(--pink));
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(24px) scale(.96)
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1)
            }
        }

        .login-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 16px rgba(99, 179, 255, .3));
        }

        .login-card h2 {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--txt), var(--acc));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .login-card .subtitle {
            text-align: center;
            font-size: 13px;
            color: var(--dim);
            margin-bottom: 28px;
            font-weight: 400;
        }

        .login-field {
            margin-bottom: 16px;
        }

        .login-field label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .login-field input {
            width: 100%;
            font-family: var(--f);
            font-size: 14px;
            font-weight: 500;
            padding: 13px 16px;
            background: var(--bg2);
            border: 1px solid var(--brd);
            border-radius: var(--r3);
            color: var(--txt);
            outline: 0;
            transition: all .2s ease;
        }

        .login-field input:focus {
            border-color: var(--acc);
            box-shadow: 0 0 0 4px var(--acc-glow), var(--shadow-glow);
        }

        .login-field input::placeholder {
            color: var(--mute);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            font-family: var(--f);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: .3px;
            color: #fff;
            background: linear-gradient(135deg, var(--acc2), var(--acc));
            border: none;
            border-radius: var(--r3);
            cursor: pointer;
            transition: all .25s ease;
            margin-top: 8px;
            box-shadow: 0 4px 20px rgba(99, 179, 255, .25);
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(99, 179, 255, .35);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .login-err {
            color: var(--red);
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            margin-top: 12px;
            min-height: 18px;
        }

        /* ===== MAIN APP SHELL ===== */
        .app {
            position: relative;
            z-index: 1;
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        .app.active {
            display: flex;
        }

        /* ===== TOP BAR ===== */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: linear-gradient(180deg, var(--surf), var(--bg2));
            border-bottom: 1px solid var(--brd);
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }

        .topbar::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--acc-glow), transparent);
        }

        .tb-brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .tb-logo {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }

        .tb-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 2px 8px rgba(99, 179, 255, .15));
        }

        .tb-logo-text {
            height: 28px;
        }

        .tb-logo-text img {
            height: 100%;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 1px 4px rgba(99, 179, 255, .1));
        }

        .tb-info h1 {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -.3px;
            line-height: 1.2;
        }

        .tb-info small {
            font-size: 11px;
            color: var(--dim);
            font-weight: 400;
        }

        .tb-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn {
            font-family: var(--f);
            font-size: 12px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: var(--r3);
            border: 1px solid var(--brd);
            background: var(--surf2);
            color: var(--txt2);
            cursor: pointer;
            transition: all .2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .btn:hover {
            border-color: var(--brd2);
            background: var(--surf3);
            color: var(--txt);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--acc3), var(--acc2));
            border-color: var(--acc2);
            color: #fff;
            box-shadow: 0 2px 16px rgba(99, 179, 255, .2);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 24px rgba(99, 179, 255, .3);
            transform: translateY(-1px);
        }

        .btn-danger {
            border-color: rgba(251, 113, 133, .3);
            color: var(--red);
        }

        .btn-danger:hover {
            background: var(--red-bg);
            border-color: var(--red);
        }

        .btn-clear {
            border-color: rgba(251, 191, 36, .3);
            color: var(--org);
        }

        .btn-clear:hover {
            background: var(--org-bg);
            border-color: var(--org);
        }

        /* ===== CONTENT AREA ===== */
        .content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 300px;
            border-right: 1px solid var(--brd);
            background: var(--bg2);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }

        .sb-section {
            padding: 18px 18px 14px;
            flex-shrink: 0;
        }

        .sb-section+.sb-section {
            border-top: 1px solid var(--brd);
        }

        .sb-section.scrollable {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 8px;
        }

        .sb-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .sb-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--dim);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sb-label .indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .sb-count {
            font-size: 10px;
            font-weight: 700;
            color: var(--mute);
            background: var(--surf3);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .sb-input-row {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }

        .sb-input-row input {
            flex: 1;
            font-family: var(--f);
            font-size: 13px;
            font-weight: 500;
            padding: 9px 12px;
            background: var(--surf);
            border: 1px solid var(--brd);
            border-radius: var(--r3);
            color: var(--txt);
            outline: 0;
            transition: all .2s;
        }

        .sb-input-row input:focus {
            border-color: var(--acc);
            box-shadow: 0 0 0 3px var(--acc-glow);
        }

        .sb-input-row input::placeholder {
            color: var(--mute);
            font-weight: 400;
        }

        .sb-input-row .btn-add {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: var(--r3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all .2s;
            font-size: 20px;
            color: #fff;
            flex-shrink: 0;
        }

        .btn-add-worker {
            background: linear-gradient(135deg, var(--acc3), var(--acc2));
        }

        .btn-add-worker:hover {
            transform: scale(1.08);
            box-shadow: 0 4px 16px rgba(99, 179, 255, .3);
        }

        .btn-add-area {
            background: linear-gradient(135deg, var(--grn2), var(--grn));
        }

        .btn-add-area:hover {
            transform: scale(1.08);
            box-shadow: 0 4px 16px rgba(74, 222, 128, .3);
        }

        .item-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* Worker chip (draggable) */
        .worker-chip {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: var(--r3);
            cursor: grab;
            transition: all .18s ease;
            border: 1px solid transparent;
            font-size: 13px;
            font-weight: 600;
            user-select: none;
            position: relative;
        }

        .worker-chip::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--r3);
            opacity: 0;
            transition: opacity .2s;
            pointer-events: none;
        }

        .worker-chip:hover {
            transform: translateX(4px);
            border-color: rgba(255, 255, 255, .06);
        }

        .worker-chip:hover::before {
            opacity: 1;
        }

        .worker-chip:active {
            cursor: grabbing;
            transform: scale(.97);
            opacity: .8;
        }

        .worker-chip .wc-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 8px currentColor;
        }

        .worker-chip .wc-name {
            flex: 1;
        }

        .worker-chip .wc-remove {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 11px;
            font-weight: 700;
            opacity: 0;
            transition: all .15s;
            cursor: pointer;
            background: rgba(251, 113, 133, .15);
            color: var(--red);
        }

        .worker-chip:hover .wc-remove {
            opacity: 1;
        }

        .worker-chip .wc-remove:hover {
            background: var(--red);
            color: #fff;
            transform: scale(1.15);
        }

        /* Area chip */
        .area-chip {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: var(--r3);
            font-size: 13px;
            font-weight: 500;
            background: var(--surf);
            border: 1px solid var(--brd);
            transition: all .18s;
            color: var(--txt2);
        }

        .area-chip:hover {
            border-color: var(--brd2);
        }

        .area-chip .ac-icon {
            width: 8px;
            height: 8px;
            border-radius: 3px;
            background: var(--grn);
            flex-shrink: 0;
        }

        .area-chip .ac-name {
            flex: 1;
        }

        .area-chip .ac-remove {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 11px;
            font-weight: 700;
            opacity: 0;
            transition: all .15s;
            cursor: pointer;
            background: rgba(251, 113, 133, .15);
            color: var(--red);
        }

        .area-chip:hover .ac-remove {
            opacity: 1;
        }

        .area-chip .ac-remove:hover {
            background: var(--red);
            color: #fff;
        }

        /* Helper text */
        .sb-hint {
            font-size: 11px;
            color: var(--mute);
            font-style: italic;
            text-align: center;
            padding: 12px 8px;
        }

        /* ===== SCHEDULE MAIN AREA ===== */
        .schedule-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }

        /* Toolbar above grid */
        .grid-toolbar {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 20px;
            background: var(--bg2);
            border-bottom: 1px solid var(--brd);
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .gt-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .gt-group label {
            font-size: 11px;
            font-weight: 600;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: .8px;
        }

        .gt-group input[type=number],
        .gt-group input[type=date],
        .gt-group select {
            font-family: var(--f);
            font-size: 13px;
            font-weight: 600;
            padding: 6px 8px;
            background: var(--surf);
            border: 1px solid var(--brd);
            border-radius: 6px;
            color: var(--txt);
            outline: 0;
            text-align: center;
            transition: all .2s;
        }

        .gt-group input[type=number] {
            width: 56px;
        }

        .gt-group input[type=date] {
            width: 150px;
            color-scheme: dark;
        }

        .gt-group input:focus,
        .gt-group select:focus {
            border-color: var(--acc);
            box-shadow: 0 0 0 3px var(--acc-glow);
        }

        .gt-spacer {
            flex: 1;
        }

        .gt-stats {
            display: flex;
            gap: 16px;
        }

        .gt-stat {
            font-size: 11px;
            color: var(--dim);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .gt-stat strong {
            font-weight: 700;
            color: var(--txt);
        }

        /* ===== SCHEDULE GRID ===== */
        .schedule-scroll {
            flex: 1;
            overflow: auto;
            padding: 16px 16px 40px;
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: 110px repeat(8, 1fr);
            border-radius: var(--r2);
            overflow: hidden;
            border: 1px solid var(--brd);
            background: var(--surf);
            box-shadow: var(--shadow-sm);
            min-width: 900px;
        }

        /* Header cells */
        .sg-hdr {
            padding: 14px 8px;
            text-align: center;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(180deg, var(--surf2), var(--surf));
            border-bottom: 2px solid var(--brd);
            border-right: 1px solid var(--brd);
            color: var(--dim);
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .sg-hdr:last-child {
            border-right: none;
        }

        .sg-hdr.day-col {
            color: var(--acc);
            font-weight: 800;
        }

        .sg-hdr.day-col .day-short {
            display: block;
            font-size: 9px;
            font-weight: 500;
            color: var(--dim);
            margin-top: 2px;
            letter-spacing: .5px;
            text-transform: none;
        }

        .sg-hdr.today-col {
            color: var(--grn);
            background: linear-gradient(180deg, rgba(74, 222, 128, .06), transparent);
        }

        .sg-hdr.today-col::after {
            content: 'HOY';
            display: block;
            font-size: 8px;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: var(--grn);
            margin-top: 2px;
            background: rgba(74, 222, 128, .12);
            border-radius: 4px;
            padding: 1px 6px;
            display: inline-block;
        }

        .sg-hdr.weekend-col {
            color: var(--org);
        }

        /* Time cells */
        .sg-time {
            padding: 0 6px;
            text-align: center;
            font-family: var(--f);
            font-size: 10px;
            font-weight: 700;
            color: var(--mute);
            border-bottom: 1px solid var(--brd);
            border-right: 1px solid var(--brd);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg2);
            letter-spacing: .3px;
            line-height: 1.4;
            gap: 1px;
        }

        .sg-time .time-range {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        .sg-time .time-start {
            font-size: 12px;
            font-weight: 800;
            color: var(--dim);
        }

        .sg-time .time-sep {
            font-size: 8px;
            font-weight: 500;
            color: var(--mute);
            text-transform: lowercase;
        }

        .sg-time .time-end {
            font-size: 10px;
            font-weight: 600;
            color: var(--mute);
        }

        /* Data cells */
        .sg-cell {
            min-height: 56px;
            border-bottom: 1px solid var(--brd);
            border-right: 1px solid var(--brd);
            padding: 4px;
            transition: background .15s ease;
            display: flex;
            flex-direction: column;
            gap: 3px;
            position: relative;
            background: var(--bg2);
        }

        .sg-cell:nth-child(9n) {
            border-right: none;
        }

        .sg-cell:hover {
            background: rgba(99, 179, 255, .02);
        }

        /* Drag over state */
        .sg-cell.drag-over {
            background: rgba(99, 179, 255, .08) !important;
            box-shadow: inset 0 0 0 2px var(--acc), inset 0 0 20px rgba(99, 179, 255, .06);
        }

        .sg-cell.drag-over::after {
            content: '+ Soltar aquí';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: var(--acc);
            letter-spacing: .5px;
            text-transform: uppercase;
            pointer-events: none;
            opacity: .7;
        }

        .sg-cell.drag-over.has-entries::after {
            display: none;
        }

        /* Even/odd row alternation */
        .sg-cell.row-even {
            background: var(--surf);
        }

        .sg-cell.row-even:hover {
            background: rgba(99, 179, 255, .03);
        }

        /* Weekend columns */
        .sg-cell.weekend {
            background: rgba(251, 191, 36, .02);
        }

        /* Today column highlight */
        .sg-cell.today-highlight {
            background: rgba(74, 222, 128, .03);
        }

        /* ===== CELL ENTRIES (assigned workers) ===== */
        .cell-entry {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            position: relative;
            animation: entryPop .3s cubic-bezier(.22, 1, .36, 1);
            cursor: default;
            transition: all .15s;
            border: 1px solid transparent;
        }

        @keyframes entryPop {
            from {
                opacity: 0;
                transform: scale(.8) translateY(4px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .cell-entry:hover {
            border-color: rgba(255, 255, 255, .1);
        }

        .cell-entry .ce-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .cell-entry .ce-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 600;
        }

        .cell-entry .ce-area-tag {
            font-size: 9px;
            font-weight: 500;
            opacity: .65;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60px;
            padding: 1px 5px;
            border-radius: 3px;
            background: rgba(255, 255, 255, .08);
        }

        .cell-entry .ce-remove {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 9px;
            font-weight: 800;
            opacity: 0;
            transition: all .12s;
            cursor: pointer;
            flex-shrink: 0;
            background: rgba(0, 0, 0, .3);
            color: rgba(255, 255, 255, .7);
        }

        .cell-entry:hover .ce-remove {
            opacity: 1;
        }

        .cell-entry .ce-remove:hover {
            background: var(--red);
            color: #fff;
            transform: scale(1.2);
        }

        /* Area selector on click */
        .cell-entry .ce-select {
            position: absolute;
            top: 0;
            left: 0;
            right: 22px;
            bottom: 0;
            opacity: 0;
            cursor: pointer;
            border-radius: 6px;
            z-index: 1;
        }

        .cell-entry .ce-remove {
            z-index: 2;
            position: relative;
        }

        /* ===== VIEW MODE TOGGLE ===== */
        .mode-toggle {
            display: flex;
            gap: 2px;
            background: var(--surf);
            border: 1px solid var(--brd);
            border-radius: 8px;
            padding: 2px;
        }

        .mode-btn {
            font-family: var(--f);
            font-size: 12px;
            font-weight: 600;
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
            color: var(--dim);
            transition: all .2s;
            white-space: nowrap;
        }

        .mode-btn.active {
            background: var(--acc);
            color: #fff;
            box-shadow: 0 2px 8px rgba(99, 179, 255, .3);
        }

        .mode-btn:not(.active):hover {
            color: var(--txt);
            background: var(--surf2);
        }

        /* ===== DAY HEADER ACTIONS (Copy/Paste) ===== */
        .sg-hdr.day-col {
            position: relative;
        }

        .day-actions {
            display: flex;
            gap: 2px;
            margin-top: 3px;
        }

        .day-act {
            font-family: var(--f);
            font-size: 9px;
            font-weight: 600;
            padding: 2px 6px;
            border: 1px solid var(--brd);
            border-radius: 4px;
            cursor: pointer;
            background: var(--surf);
            color: var(--dim);
            transition: all .15s;
        }

        .day-act:hover {
            background: var(--acc);
            color: #fff;
            border-color: var(--acc);
        }

        .day-act.pasted {
            background: var(--grn);
            color: #fff;
            border-color: var(--grn);
        }

        .sg-hdr.day-col.copied-col {
            box-shadow: inset 0 -3px 0 var(--acc);
        }

        /* ===== MULTI-HOUR DRAG SELECTION ===== */
        .sg-cell.range-select {
            background: rgba(99, 179, 255, .12) !important;
            box-shadow: inset 0 0 0 2px rgba(99, 179, 255, .4);
        }

        .sg-cell.range-select::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(99, 179, 255, .08), rgba(99, 179, 255, .02));
            pointer-events: none;
            z-index: 0;
        }

        /* ===== SHIFT MODE GRID ===== */
        .schedule-grid.shift-mode {
            grid-template-columns: 140px repeat(8, 1fr);
        }

        .sg-shift-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 6px;
            background: var(--surf2);
            border-right: 1px solid var(--brd);
            border-bottom: 1px solid var(--brd);
            gap: 2px;
        }

        .sg-shift-label .shift-icon {
            font-size: 18px;
        }

        .sg-shift-label .shift-name {
            font-size: 12px;
            font-weight: 700;
            color: var(--txt);
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .sg-shift-label .shift-hours {
            font-size: 10px;
            color: var(--dim);
            font-weight: 500;
        }

        .sg-shift-cell {
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 3px;
            padding: 6px;
            min-height: 55px;
            background: var(--bg2);
            border-right: 1px solid var(--brd);
            border-bottom: 1px solid var(--brd);
            position: relative;
            transition: background .15s;
        }

        .sg-shift-cell.weekend {
            background: rgba(99, 179, 255, .02);
        }

        .sg-shift-cell.drag-over {
            background: rgba(99, 179, 255, .08) !important;
            box-shadow: inset 0 0 0 2px var(--acc);
        }

        .sg-shift-cell.has-entries {
            background: rgba(99, 179, 255, .03);
        }

        .shift-pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            position: relative;
            cursor: default;
        }

        .shift-pill .sp-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .shift-pill .sp-remove {
            font-size: 10px;
            cursor: pointer;
            opacity: 0;
            margin-left: 2px;
            transition: all .15s;
            font-weight: 700;
            width: 14px;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .shift-pill:hover .sp-remove {
            opacity: 1;
        }

        .shift-pill .sp-remove:hover {
            background: var(--red);
            color: #fff;
        }

        /* Area selector on shift pills */
        .shift-pill .sp-area-select {
            font-family: var(--f);
            font-size: 9px;
            font-weight: 600;
            padding: 1px 4px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, .15);
            background: rgba(0, 0, 0, .3);
            color: inherit;
            cursor: pointer;
            max-width: 70px;
            outline: none;
            transition: all .15s;
        }

        .shift-pill .sp-area-select:hover,
        .shift-pill .sp-area-select:focus {
            border-color: rgba(255, 255, 255, .3);
            background: rgba(0, 0, 0, .5);
        }

        /* ===== EXTRA HOURS ROW (Shift View) ===== */
        .sg-extra-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 6px;
            background: var(--surf);
            border-right: 1px solid var(--brd);
            border-bottom: 2px solid var(--brd);
            gap: 2px;
            position: relative;
        }

        .sg-extra-label::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: repeating-linear-gradient(90deg, var(--brd) 0, var(--brd) 4px, transparent 4px, transparent 8px);
        }

        .sg-extra-label .extra-icon {
            font-size: 14px;
        }

        .sg-extra-label .extra-name {
            font-size: 10px;
            font-weight: 700;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .sg-extra-label .extra-hours {
            font-size: 9px;
            color: var(--mute);
            font-weight: 500;
        }

        .sg-extra-cell {
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 3px;
            padding: 5px;
            min-height: 40px;
            background: rgba(15, 21, 32, .6);
            border-right: 1px solid var(--brd);
            border-bottom: 2px solid var(--brd);
            position: relative;
            transition: background .15s;
            border-top: 2px dashed rgba(99, 179, 255, .15);
        }

        .sg-extra-cell.weekend {
            background: rgba(251, 191, 36, .015);
        }

        .sg-extra-cell.drag-over {
            background: rgba(99, 179, 255, .06) !important;
            box-shadow: inset 0 0 0 2px rgba(99, 179, 255, .4);
        }

        .sg-extra-cell.has-entries {
            background: rgba(99, 179, 255, .02);
        }

        .extra-pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 7px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 600;
            position: relative;
            cursor: default;
            border: 1px dashed rgba(255, 255, 255, .12);
            opacity: .85;
        }

        .extra-pill .ep-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .extra-pill .ep-area-select {
            font-family: var(--f);
            font-size: 8px;
            font-weight: 600;
            padding: 1px 3px;
            border-radius: 3px;
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(0, 0, 0, .3);
            color: inherit;
            cursor: pointer;
            max-width: 60px;
            outline: none;
        }

        .extra-pill .ep-remove {
            font-size: 9px;
            cursor: pointer;
            opacity: 0;
            margin-left: 1px;
            transition: all .12s;
            font-weight: 700;
            width: 13px;
            height: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .extra-pill:hover .ep-remove {
            opacity: 1;
        }

        .extra-pill .ep-remove:hover {
            background: var(--red);
            color: #fff;
        }

        /* Extra hours differentiation in HOURS view */
        .cell-entry.is-extra {
            border: 1px dashed rgba(255, 255, 255, .15);
            opacity: .7;
        }

        .cell-entry.is-extra .ce-extra-tag {
            font-size: 8px;
            font-weight: 700;
            padding: 0 4px;
            border-radius: 3px;
            background: rgba(129, 140, 248, .2);
            color: #818CF8;
            white-space: nowrap;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            padding: 12px 24px;
            border-radius: var(--r3);
            font-size: 13px;
            font-weight: 600;
            box-shadow: var(--shadow-md);
            opacity: 0;
            transition: all .4s cubic-bezier(.22, 1, .36, 1);
            z-index: 3000;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(12px);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.ok {
            background: rgba(74, 222, 128, .15);
            border: 1px solid rgba(74, 222, 128, .3);
            color: var(--grn);
        }

        .toast.err {
            background: rgba(251, 113, 133, .15);
            border: 1px solid rgba(251, 113, 133, .3);
            color: var(--red);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 960px) {
            .content {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--brd);
                max-height: 220px;
                flex-direction: row;
            }

            .sb-section {
                flex: 1;
                min-width: 0;
            }

            .topbar {
                flex-wrap: wrap;
                gap: 8px;
            }

            .tb-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>

<body>

    <!-- ===== LOGIN ===== -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <div class="login-logo"><img src="logo.png" alt="Importadora Bella"></div>
            <h2>Acceso Supervisor</h2>
            <p class="subtitle">Panel de gestión de horarios — Importadora Bella</p>
            <div class="login-field">
                <label>Usuario</label>
                <input type="text" id="loginUser" placeholder="Ingrese su usuario" autocomplete="off">
            </div>
            <div class="login-field">
                <label>Contraseña</label>
                <input type="password" id="loginPass" placeholder="••••••••">
            </div>
            <button class="btn-login" id="btnLogin">Iniciar Sesión</button>
            <div class="login-err" id="loginErr"></div>
        </div>
    </div>

    <!-- ===== MAIN APP ===== -->
    <div class="app" id="mainApp">
        <div class="topbar">
            <div class="tb-brand">
                <div class="tb-logo"><img src="logo.png" alt="Logo"></div>
                <div class="tb-logo-text"><img src="logoLetras.png" alt="Importadora Bella"></div>
                <div class="tb-info">
                    <h1>Gestión de Horarios</h1>
                    <small>Panel de Supervisor</small>
                </div>
            </div>
            <div class="tb-actions">
                <a href="index.html" class="btn">← Reportes</a>
                <button class="btn btn-clear" id="btnClear" title="Limpiar todo el horario">🗑 Limpiar</button>
                <button class="btn btn-primary" id="btnPDF">📄 Descargar PDF</button>
                <button class="btn btn-danger" id="btnLogout">Salir</button>
            </div>
        </div>

        <div class="content">
            <!-- SIDEBAR -->
            <div class="sidebar">
                <!-- Workers -->
                <div class="sb-section">
                    <div class="sb-head">
                        <div class="sb-label">
                            <span class="indicator" style="background:var(--acc)"></span>
                            Trabajadores
                        </div>
                        <span class="sb-count" id="workerCount">0</span>
                    </div>
                    <div class="sb-input-row">
                        <input id="workerInput" placeholder="Nombre del trabajador…" maxlength="30">
                        <button class="btn-add btn-add-worker" id="btnAddWorker" title="Agregar">+</button>
                    </div>
                    <div class="item-list" id="workerList"></div>
                    <div class="sb-hint" id="workerHint">Arrastra los trabajadores hacia la grilla →</div>
                </div>

                <!-- Areas -->
                <div class="sb-section scrollable">
                    <div class="sb-head">
                        <div class="sb-label">
                            <span class="indicator" style="background:var(--grn)"></span>
                            Áreas de Trabajo
                        </div>
                        <span class="sb-count" id="areaCount">0</span>
                    </div>
                    <div class="sb-input-row">
                        <input id="areaInput" placeholder="Nombre del área…" maxlength="30">
                        <button class="btn-add btn-add-area" id="btnAddArea" title="Agregar">+</button>
                    </div>
                    <div class="item-list" id="areaList"></div>
                </div>
            </div>

            <!-- SCHEDULE AREA -->
            <div class="schedule-area">
                <div class="grid-toolbar">
                    <div class="mode-toggle">
                        <button class="mode-btn active" id="modeHours" data-mode="hours">🕐 Por Horas</button>
                        <button class="mode-btn" id="modeShifts" data-mode="shifts">📋 Por Turnos</button>
                    </div>
                    <div class="gt-group">
                        <label>Semana del</label>
                        <input type="date" id="weekStartDate">
                    </div>
                    <div class="gt-group" id="hourControls">
                        <label>Hora desde</label>
                        <input type="number" id="hourStart" value="6" min="0" max="23">
                        <label>hasta</label>
                        <input type="number" id="hourEnd" value="22" min="1" max="24">
                        <button class="btn" id="btnApply" style="padding:6px 12px">Aplicar</button>
                    </div>
                    <div class="gt-spacer"></div>
                    <div class="gt-stats">
                        <div class="gt-stat">Turnos asignados: <strong id="statAssigned">0</strong></div>
                        <div class="gt-stat">Celdas: <strong id="statCells">0</strong></div>
                    </div>
                </div>
                <div class="schedule-scroll">
                    <div class="schedule-grid" id="scheduleGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        /* ===== STATE ===== */
        let workers = [];
        let areas = [];
        let schedule = {};
        let hourStart = 6, hourEnd = 22;
        let weekStartDate = '';
        let viewMode = 'hours'; // 'hours' or 'shifts'
        let copiedDay = null;   // {dayIndex, entries: [{hour, workerId, areaId}]}
        let copiedDayIdx = -1;

        // Multi-hour drag state
        let rangeDrag = { active: false, workerId: '', dayIdx: -1, startHour: -1, endHour: -1 };

        // Shift definitions (with 2 hours for "Otra Área" after each shift)
        const SHIFTS = [
            { name: 'Mañana', icon: '🌅', startH: 6, endH: 12, extraStartH: 12, extraEndH: 14, color: '#FBBF24' },
            { name: 'Tarde', icon: '☀️', startH: 12, endH: 18, extraStartH: 18, extraEndH: 20, color: '#FB923C' },
            { name: 'Noche', icon: '🌙', startH: 18, endH: 24, extraStartH: 24, extraEndH: 26, color: '#818CF8' } // 24 = midnight, 26 = 2am next day (wraps)
        ];

        const DAY_NAMES = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
        const MONTH_NAMES = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
        const NUM_DAYS = 8;
        const COLORS = [
            '#63B3FF', '#4ADE80', '#FBBF24', '#FB7185', '#A78BFA', '#F472B6', '#22D3EE',
            '#FB923C', '#818CF8', '#2DD4BF', '#E879F9', '#84CC16', '#34D399', '#F59E0B',
            '#EC4899', '#38BDF8', '#A3E635', '#C084FC'
        ];
        let colorIdx = 0;

        // Get the 8 grid day objects [{name, date, dayNum, monthName, isWeekend, dateStr}]
        function getGridDays() {
            const days = [];
            let start;
            if (weekStartDate) {
                const parts = weekStartDate.split('-');
                start = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
            } else {
                // Default: find last Sunday
                start = new Date();
                start.setDate(start.getDate() - start.getDay());
            }
            for (let i = 0; i < NUM_DAYS; i++) {
                const d = new Date(start);
                d.setDate(start.getDate() + i);
                const dow = d.getDay(); // 0=Sun
                days.push({
                    name: DAY_NAMES[dow],
                    dayNum: d.getDate(),
                    monthName: MONTH_NAMES[d.getMonth()],
                    isWeekend: dow === 0 || dow === 6,
                    dateStr: d.toLocaleDateString('es-EC', { day: 'numeric', month: 'short' }),
                    fullDate: d
                });
            }
            return days;
        }

        // Initialize weekStartDate input to nearest past Sunday
        function initWeekDate() {
            if (!weekStartDate) {
                const now = new Date();
                now.setDate(now.getDate() - now.getDay());
                weekStartDate = now.toISOString().split('T')[0];
            }
            $('weekStartDate').value = weekStartDate;
        }
        let dragWorkerId = null;

        /* ===== SELECTORS ===== */
        const $ = id => document.getElementById(id);

        /* ===== LOGIN ===== */
        function doLogin() {
            const u = $('loginUser').value.trim();
            const p = $('loginPass').value;
            if (u === 'admin' && p === 'admin') {
                sessionStorage.setItem('sv_auth', '1');
                $('loginOverlay').style.display = 'none';
                $('mainApp').classList.add('active');
                loadState();
                rebuildGrid();
            } else {
                $('loginErr').textContent = '⚠ Usuario o contraseña incorrectos';
                $('loginPass').value = '';
                $('loginPass').focus();
            }
        }

        $('btnLogin').addEventListener('click', doLogin);
        $('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
        $('loginUser').addEventListener('keydown', e => { if (e.key === 'Enter') { $('loginPass').focus(); } });

        $('btnLogout').addEventListener('click', () => {
            sessionStorage.removeItem('sv_auth');
            location.reload();
        });

        // Auto-login
        if (sessionStorage.getItem('sv_auth') === '1') {
            $('loginOverlay').style.display = 'none';
            $('mainApp').classList.add('active');
        }

        /* ===== PERSISTENCE ===== */
        function saveState() {
            try {
                localStorage.setItem('sv_data', JSON.stringify({
                    workers, areas, schedule, hourStart, hourEnd, colorIdx, weekStartDate, viewMode
                }));
            } catch (e) { }
        }

        function loadState() {
            try {
                const raw = localStorage.getItem('sv_data');
                if (!raw) return;
                const d = JSON.parse(raw);
                if (d.workers) workers = d.workers;
                if (d.areas) areas = d.areas;
                if (d.schedule) schedule = d.schedule;
                if (d.hourStart != null) { hourStart = d.hourStart; $('hourStart').value = hourStart; }
                if (d.hourEnd != null) { hourEnd = d.hourEnd; $('hourEnd').value = hourEnd; }
                if (d.colorIdx != null) colorIdx = d.colorIdx;
                if (d.weekStartDate) { weekStartDate = d.weekStartDate; $('weekStartDate').value = weekStartDate; }
                if (d.viewMode) viewMode = d.viewMode;
                renderWorkers();
                renderAreas();
            } catch (e) { }
        }

        /* ===== WORKERS ===== */
        function addWorker() {
            const inp = $('workerInput');
            const name = inp.value.trim();
            if (!name) { toast('Ingrese un nombre', true); return; }
            // Duplicate check
            if (workers.some(w => w.name.toLowerCase() === name.toLowerCase())) {
                toast('Este trabajador ya existe', true); return;
            }
            const color = COLORS[colorIdx % COLORS.length];
            colorIdx++;
            workers.push({ id: 'w' + Date.now() + Math.random().toString(36).slice(2, 6), name, color });
            inp.value = '';
            inp.focus();
            renderWorkers();
            rebuildGrid();
            saveState();
            toast('Trabajador agregado');
        }

        function removeWorker(id) {
            workers = workers.filter(w => w.id !== id);
            Object.keys(schedule).forEach(k => {
                schedule[k] = schedule[k].filter(e => e.workerId !== id);
                if (!schedule[k].length) delete schedule[k];
            });
            renderWorkers();
            rebuildGrid();
            saveState();
        }

        function renderWorkers() {

                // Attach drag events

        $('btnAddWorker').addEventListener('click', addWorker);

        /* ===== AREAS ===== */
        function addArea() {
            const inp = $('areaInput');
            const name = inp.value.trim();
            if (!name) { toast('Ingrese un nombre de área', true); return; }
            // Duplicate check
            if (areas.some(a => a.name.toLowerCase() === name.toLowerCase())) {

            areas.push({ id: 'a' + Date.now() + Math.random().toString(36).slice(2, 6), name });
            inp.value = '';
            inp.focus();
            renderAreas();
            rebuildGrid();
            saveState();
            toast('Área agregada');
        }

        function removeArea(id) {
            areas = areas.filter(a => a.id !== id);
            Object.keys(schedule).forEach(k => {
                schedule[k].forEach(e => { if (e.areaId === id) e.areaId = ''; });
            });
            renderAreas();
            rebuildGrid();
            saveState();
        }

        function renderAreas() {
            const list = $('areaList');
            list.innerHTML = areas.map(a => `
    <div class="area-chip">
      <span class="ac-icon"></span>
      <span class="ac-name">${esc(a.name)}</span>
